 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCraft | Text to Speech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🎙️</span>
            <span class="logo-text">VoiceCraft</span>
        </div>
        <p class="tagline">Turn your words into voice, instantly</p>
    </header>

    <main class="container">

        <section class="card input-card">
            <label for="textToSpeak" class="card-label">Your text</label>
            <textarea
                id="textToSpeak"
                placeholder="Type or paste anything you want to hear out loud..."
                maxlength="3000"
            ></textarea>
            <div class="char-counter">
                <span id="charCount">0</span> / 3000
            </div>
        </section>

        <section class="card controls-card">

            <div class="control-group">
                <label for="voiceSelect">Voice</label>
                <select id="voiceSelect"></select>
            </div>

            <div class="control-group">
                <label for="rateSlider">Speed <span id="rateValue">1.0</span>x</label>
                <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label for="pitchSlider">Pitch <span id="pitchValue">1.0</span></label>
                <input type="range" id="pitchSlider" min="0" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label for="volumeSlider">Volume <span id="volumeValue">100</span>%</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
            </div>

        </section>

        <section class="action-row">
            <button id="speakBtn" class="btn btn-primary">
                <span class="btn-icon">▶</span> Speak
            </button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>
                <span class="btn-icon">⏸</span> Pause
            </button>
            <button id="stopBtn" class="btn btn-secondary" disabled>
                <span class="btn-icon">⏹</span> Stop
            </button>
        </section>

        <p id="statusMsg" class="status-msg" role="status" aria-live="polite"></p>

    </main>

    <footer class="footer">
        Built with the Web Speech API · by Srilaksha
    </footer>

    <script src="script.js"></script>
</body>
</html>
